<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ✅ FIXED Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6CYFMPH84F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6CYFMPH84F');

  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="LinkTradeNetwork — The professional network built exclusively for skilled trade workers. Find jobs, connect with contractors, and grow your trade career."/>
  <meta property="og:title" content="LinkTradeNetwork — Built for the Trades"/>
  <meta property="og:description" content="Stop chasing jobs. Get found instead. Join thousands of trade professionals on LTN."/>
  <title>LinkTradeNetwork — Built for the Trades</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --brand:#ea6a00;
      --brand2:#c35700;
      --dark:#0a0c10;
      --dark2:#12161e;
      --light:#f5f7fa;
      --muted:#8a9ab5;
      --white:#ffffff;
    }
    html{scroll-behavior:smooth}
    body{
      background:var(--dark);
      color:var(--white);
      font-family:'Barlow',sans-serif;
      font-size:16px;
      line-height:1.6;
      overflow-x:hidden;
    }

    .hero{
      position:relative;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      overflow:hidden;
      background:
        linear-gradient(to bottom, rgba(10,12,16,0.2) 0%, rgba(10,12,16,0.45) 55%, rgba(10,12,16,0.95) 100%),
        radial-gradient(circle at center, rgba(234,106,0,0.18) 0%, rgba(10,12,16,0) 40%),
        linear-gradient(135deg, #131820 0%, #1a1f29 35%, #22170e 65%, #0a0c10 100%);
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size:40px 40px;
      opacity:.15;
      pointer-events:none;
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(
        to bottom,
        rgba(10,12,16,0.2) 0%,
        rgba(10,12,16,0.15) 40%,
        rgba(10,12,16,0.7) 75%,
        rgba(10,12,16,1) 100%
      );
      pointer-events:none;
    }

    .hero-nav{
      position:relative;
      z-index:10;
      width:100%;
      max-width:1200px;
      margin:0 auto;
      padding:24px 32px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .nav-logo{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
    }

    .nav-badge{
      width:48px;height:48px;
      background:var(--brand);
      border-radius:12px;
      display:grid;place-items:center;
      font-family:'Barlow Condensed',sans-serif;
      font-weight:900;font-size:20px;
      color:white;
      box-shadow:0 4px 16px rgba(234,106,0,0.5);
    }

    .nav-name{
      font-family:'Barlow Condensed',sans-serif;
      font-weight:700;font-size:22px;
      color:white;
    }

    .nav-cta{
      background:var(--brand);
      color:white;
      text-decoration:none;
      font-weight:600;
      padding:12px 28px;
      border-radius:50px;
    }

    .hero-content{
      position:relative;
      z-index:10;
      max-width:900px;
      padding:60px 20px;
      text-align:center;
    }

    .hero-h1{
      font-size:60px;
      font-weight:900;
      text-transform:uppercase;
    }

    .hero-h1 span{color:var(--brand)}

    .hero-sub{
      margin:20px 0 40px;
      color:#ccc;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      padding:16px 40px;
      border-radius:50px;
      color:white;
      text-decoration:none;
      font-weight:700;
    }

    footer{
      padding:40px;
      text-align:center;
      color:#888;
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="hero-overlay"></div>

    <nav class="hero-nav">
      <a href="/" class="nav-logo">
        <div class="nav-badge">LTN</div>
        <span class="nav-name">LinkTradeNetwork</span>
      </a>
      <a href="/front.html" class="nav-cta">Join Free →</a>
    </nav>

    <div class="hero-content">
      <h1 class="hero-h1">
        Stop Chasing Jobs.<br>
        <span>Get Found Instead.</span>
      </h1>

      <p class="hero-sub">
        Join skilled trade professionals across all 50 states. Find jobs, connect with contractors, and grow your trade career.
      </p>

      <a href="/front.html" class="btn-primary">
        Join Free Today
      </a>
    </div>
  </section>

  <footer>
    © 2026 LinkTradeNetwork
  </footer>

</body>
</html>
