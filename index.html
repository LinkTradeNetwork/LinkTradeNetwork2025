<!DOCTYPE html>
<html lang="en">
<head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6CYFMPH84F"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-6CYFMPH84F');
</script>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>LinkTradeNetwork — Built for the Trades</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --brand:#ea6a00;
  --brand2:#c35700;
}

body{
  background:#0a0c10;
  color:#fff;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}

/* HERO */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* BACKGROUND IMAGE FIX */
.hero-img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  opacity:.6;

  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
}

/* OVERLAY */
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.3),rgba(0,0,0,.85));
}

/* NAV */
.hero-nav{
  position:absolute;
  top:20px;
  left:20px;
  right:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

.nav-logo{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:#fff;
}

.nav-badge{
  background:var(--brand);
  padding:10px 14px;
  border-radius:10px;
  font-weight:800;
}

.nav-cta{
  background:var(--brand);
  padding:12px 24px;
  border-radius:50px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;

  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

/* CONTENT */
.hero-content{
  position:relative;
  z-index:10;
  max-width:900px;
  padding:20px;
}

.hero-h1{
  font-size:60px;
  font-weight:900;
}

.hero-h1 span{
  color:var(--brand);
}

.hero-sub{
  margin:20px 0 40px;
  font-size:20px;
}

/* BUTTONS */
.btn-primary,
.btn-secondary{
  display:inline-block;
  padding:18px 40px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  margin:10px;

  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

.btn-primary{
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;
}

.btn-secondary{
  background:rgba(255,255,255,.2);
  color:#fff;
}

/* 🔥 FIX DOUBLE CLICK (HOVER ONLY DESKTOP) */
@media (hover: hover) and (pointer: fine){
  .nav-cta:hover{
    background:var(--brand2);
    transform:translateY(-2px);
  }

  .btn-primary:hover{
    transform:translateY(-3px);
  }

  .btn-secondary:hover{
    background:rgba(255,255,255,.3);
  }
}

/* MOBILE */
@media(max-width:768px){
  .hero-h1{
    font-size:40px;
  }
}
</style>

</head>

<body>

<section class="hero">

<!-- 🔥 KEEP YOUR IMAGE HERE -->
<img class="hero-img" src="YOUR_IMAGE_HERE.jpg" alt="background"/>

<div class="hero-overlay"></div>

<nav class="hero-nav">
  <a href="/" class="nav-logo">
    <div class="nav-badge">LTN</div>
    <span>LinkTradeNetwork</span>
  </a>

  <!-- FIXED BUTTON -->
  <a href="/front.html" class="nav-cta">Join Free →</a>
</nav>

<div class="hero-content">

<h1 class="hero-h1">
STOP CHASING JOBS.<br>
<span>GET FOUND INSTEAD.</span>
</h1>

<p class="hero-sub">
Join skilled trade professionals across all 50 states.
</p>

<!-- MAIN BUTTON -->
<a href="/front.html" class="btn-primary">
Join Free Today
</a>

<a href="#learn" class="btn-secondary">
Learn More
</a>

</div>

</section>

</body>
</html>
