<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTN Profile</title>

<style>
body{margin:0;font-family:Arial;background:#f0f4f8;color:#293241}
.topbar{background:#3d5a80;color:white;padding:16px 24px;display:flex;justify-content:space-between}
.nav a{color:white;margin-left:16px;text-decoration:none;font-weight:700}
.wrap{max-width:900px;margin:40px auto;padding:20px}
.card{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
.header{text-align:center;margin-bottom:20px}
.avatar{width:140px;height:140px;border-radius:50%;background:#3d5a80;color:white;display:flex;align-items:center;justify-content:center;font-size:50px;font-weight:800;margin:0 auto 15px;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.name{font-size:30px;font-weight:800}
.trade{color:#ea6a00;font-weight:800;margin-top:5px}
.location{color:#64748b;margin-top:5px}
.section{margin-top:25px}
.section-title{font-weight:800;margin-bottom:10px;border-bottom:1px solid #ddd;padding-bottom:5px}
.bio{color:#475569;line-height:1.6}
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{background:#f1f5f9;padding:6px 12px;border-radius:20px;font-size:13px}
.actions{margin-top:25px;display:flex;gap:10px;justify-content:center}
.btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-weight:700}
.btn-primary{background:#ea6a00;color:white}
.btn-secondary{background:#3d5a80;color:white}
.btn-disabled{background:#94a3b8;color:white;cursor:not-allowed}
.status{text-align:center;margin-top:12px;color:#64748b;font-size:14px}

/* NEW */
.verify{
  color:orange;
  margin-left:6px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>LTN • LinkTradeNetwork</div>
  <div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="members.html">Members</a>
  </div>
</div>

<div class="wrap">
  <div class="card">

    <div class="header">
      <div id="avatar" class="avatar">LT</div>

      <div id="name" class="name"></div>

      <div id="trade" class="trade"></div>
      <div id="location" class="location"></div>
    </div>

    <div class="actions">
      <button id="connectBtn" class="btn btn-primary" onclick="sendConnectionRequest()">Connect</button>
      <button class="btn btn-secondary" onclick="alert('Messaging coming next.')">Message</button>
    </div>

    <div id="connectStatus" class="status"></div>

    <div class="section">
      <div class="section-title">About</div>
      <div id="bio" class="bio"></div>
    </div>

    <div class="section">
      <div class="section-title">Skills</div>
      <div id="skills" class="tags"></div>
    </div>

    <div class="section">
      <div class="section-title">Certifications</div>
      <div id="certs" class="bio"></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  serverTimestamp,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVlM1EtPtMMO6A_u1XUnWO2ie3E2liY6c",
  authDomain: "linktradenetwork-2dcd1.firebaseapp.com",
  projectId: "linktradenetwork-2dcd1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const profileUserId = params.get("id");

let currentUserId = null;
let currentUserEmail = "";
let currentUserData = null;
let profileUserData = null;

function setButton(text, disabled=false){
  const btn = document.getElementById("connectBtn");
  btn.innerText = text;
  btn.disabled = disabled;
  btn.className = disabled ? "btn btn-disabled" : "btn btn-primary";
}

function getStoredUser(){
  let email = localStorage.getItem("userEmail") || "";
  let name = localStorage.getItem("userName") || "";

  try{
    const u = JSON.parse(localStorage.getItem("ltn_user") || "{}");
    if(!email && u.email) email = u.email;
    if(!name && u.name) name = u.name;
  }catch(e){}

  return { email: email.trim().toLowerCase(), name: name.trim() };
}

async function findCurrentUser(){
  const stored = getStoredUser();
  currentUserEmail = stored.email;

  if(!currentUserEmail) return;

  const q = query(collection(db,"users"), where("email","==",currentUserEmail));
  const snap = await getDocs(q);

  if(!snap.empty){
    const docu = snap.docs[0];
    currentUserId = docu.id;
    currentUserData = docu.data();
  }
}

async function loadProfile(){
  if(!profileUserId){
    document.getElementById("name").innerText = "No profile selected";
    setButton("No Profile",true);
    return;
  }

  const snap = await getDoc(doc(db,"users",profileUserId));
  if(!snap.exists()){
    document.getElementById("name").innerText = "Profile not found";
    setButton("No Profile",true);
    return;
  }

  const u = snap.data();
  profileUserData = u;

  const nameEl = document.getElementById("name");

  nameEl.innerHTML =
    (u.fullName || u.name || "Trade Member") +
    (u.ltnVerified ? `<span class="verify">✔</span>` : "");

  document.getElementById("trade").innerText = u.trade || "";
  document.getElementById("location").innerText = (u.city||"") + " " + (u.state||"");
  document.getElementById("bio").innerText = u.bio || "No bio added yet.";
  document.getElementById("certs").innerText = u.certifications || "No certifications added yet.";

  const avatar = document.getElementById("avatar");
  const profilePhoto = u.profileImageUrl || u.profileImage || "";
  const displayName = u.fullName || u.name || "LT";

  if(profilePhoto){
    avatar.innerHTML = `<img src="${profilePhoto}" alt="${displayName}">`;
  }else{
    avatar.innerText = displayName.substring(0,2).toUpperCase();
  }

  const skillsBox = document.getElementById("skills");
  skillsBox.innerHTML="";
  const skills = Array.isArray(u.skills)
    ? u.skills
    : String(u.skills || "").split(",").map(s => s.trim()).filter(Boolean);

  if(skills.length){
    skills.forEach(s=>{
      let el=document.createElement("div");
      el.className="tag";
      el.innerText=s.trim();
      skillsBox.appendChild(el);
    });
  }else{
    skillsBox.innerHTML="<div class='bio'>No skills added yet.</div>";
  }
}

async function checkConnection(){
  setButton("Connect",false);

  if(!currentUserEmail) return;

  if(currentUserId===profileUserId){
    setButton("Your Profile",true);
    return;
  }

  const id=currentUserId+"_"+profileUserId;
  const snap=await getDoc(doc(db,"connections",id));

  if(snap.exists()){
    setButton("Connection Sent",true);
  }
}

window.sendConnectionRequest = async function(){
  if(!currentUserEmail){
    alert("Go back to dashboard first.");
    return;
  }

  const id=currentUserId+"_"+profileUserId;

  await setDoc(doc(db,"connections",id),{
    fromUserId:currentUserId,
    toUserId:profileUserId,
    status:"pending",
    createdAt:serverTimestamp()
  });

  setButton("Connection Sent",true);
  alert("Connection sent");
};

async function init(){
  await loadProfile();
  await findCurrentUser();
  await checkConnection();
}

init();
</script>

</body>
</html>
