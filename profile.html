<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>

<script>
const params = new URLSearchParams(window.location.search);
const userId = params.get("id") || "";

if(userId){
  window.location.replace("/profile/?id=" + encodeURIComponent(userId));
}else{
  window.location.replace("/profile/");
}
</script>
</head>

<body>
Redirecting...
</body>
</html>
