<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkTradeNetwork • Sign In</title>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ffa366,#ff7e2e);display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#fff;padding:30px;border-radius:12px;width:350px;text-align:center}
input{width:100%;padding:12px;margin-top:10px;border:1px solid #ccc;border-radius:8px}
button{width:100%;padding:14px;margin-top:15px;background:#ea6a00;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.msg{margin-top:10px;font-size:14px}
.err{color:red}.ok{color:green}
.otp{display:none}
</style>
</head>

<body>
<div class="card">

<h2>LinkTradeNetwork</h2>

<div id="signup">

<input id="first" placeholder="First Name">
<input id="last" placeholder="Last Name">
<input id="email" placeholder="Email">

<label><input type="checkbox" id="terms"> Agree to Terms</label>

<button onclick="sendCode()">Get Code</button>
<div id="msg" class="msg"></div>

<div id="otp" class="otp">
<input id="code" placeholder="Enter 6-digit code">
<button onclick="verifyCode()">Verify Code</button>
</div>

<div id="password" class="otp">
<input id="pass" type="password" placeholder="Password">
<button onclick="createAccount()">Create Account</button>
</div>

</div>

<hr>

<h3>Sign In</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Sign In</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-functions.js";

/* 🔴 PASTE YOUR CONFIG HERE */
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const functions = getFunctions(app);

const sendFn = httpsCallable(functions, "requestVerificationCode");
const verifyFn = httpsCallable(functions, "verifySignupCode");
const createFn = httpsCallable(functions, "createVerifiedUser");

let savedEmail = "";
let verified = false;

/* SEND CODE */
window.sendCode = async () => {
  const first = document.getElementById("first").value;
  const last = document.getElementById("last").value;
  const email = document.getElementById("email").value;
  const terms = document.getElementById("terms").checked;

  if(!first || !last || !email || !terms){
    msg("Fill everything + accept terms", true);
    return;
  }

  try{
    await sendFn({firstName:first,lastName:last,email});
    savedEmail = email;
    msg("Code sent to email", false);
    document.getElementById("otp").style.display="block";
  }catch(e){
    msg(e.message,true);
  }
};

/* VERIFY CODE */
window.verifyCode = async () => {
  const code = document.getElementById("code").value;

  try{
    await verifyFn({email:savedEmail,code});
    verified = true;
    msg("Verified",false);
    document.getElementById("password").style.display="block";
  }catch(e){
    msg("Invalid code",true);
  }
};

/* CREATE ACCOUNT */
window.createAccount = async () => {
  const pass = document.getElementById("pass").value;

  if(!verified){
    msg("Verify code first",true);
    return;
  }

  try{
    await createFn({email:savedEmail,password:pass});
    await signInWithEmailAndPassword(auth,savedEmail,pass);
    window.location="dashboard.html";
  }catch(e){
    msg(e.message,true);
  }
};

/* LOGIN */
window.login = async () => {
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPass").value;

  try{
    await signInWithEmailAndPassword(auth,email,pass);
    window.location="dashboard.html";
  }catch(e){
    msg("Login failed",true);
  }
};

function msg(t,err){
  const m=document.getElementById("msg");
  m.innerText=t;
  m.className="msg "+(err?"err":"ok");
}
</script>

</body>
</html>
