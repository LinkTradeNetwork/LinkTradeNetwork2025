<meta charset="utf-8" />

<title>LinkTradeNetwork • Sign In</title>

<style>
/* === YOUR ORIGINAL STYLES (UNCHANGED) === */
body{
  margin:0;
  font-family:Poppins,Arial;
  background:linear-gradient(135deg,#ffa366,#ff7e2e);
}
.wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#fff;
  padding:30px;
  border-radius:16px;
  width:100%;
  max-width:480px;
}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
}
button{
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#ea6a00;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<h2>Sign Up</h2>

<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">
<input id="email" placeholder="Email">

<!-- 🔥 REFERRAL SECTION REMOVED COMPLETELY -->

<label style="margin-top:15px;display:block">
<input type="checkbox" id="consent"> I agree to Terms & Conditions
</label>

<button id="joinBtn">Get Verification Code</button>

<div id="joinMsg"></div>

</div>
</div>

<script>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbws8lpL8vPivEBRoExKXqqxwszg8dbfwtqk1Z12xqNFjVYnuRfzjmaid2vq0ZT3TQ-D/exec";

const joinBtn = document.getElementById("joinBtn");
const joinMsg = document.getElementById("joinMsg");

joinBtn.onclick = async () => {

  const firstName = document.getElementById("firstName").value.trim();
  const lastName = document.getElementById("lastName").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const consent = document.getElementById("consent").checked;

  if(!firstName || !lastName || !email){
    joinMsg.innerHTML = "Please fill all fields";
    return;
  }

  if(!consent){
    joinMsg.innerHTML = "You must agree to Terms";
    return;
  }

  joinBtn.disabled = true;
  joinMsg.innerHTML = "Sending code...";

  try{
    const res = await fetch(APPS_SCRIPT_URL,{
      method:"POST",
      body:JSON.stringify({
        action:"signup",
        name:firstName + " " + lastName,
        email:email,
        consent:true
      })
    });

    const text = await res.text();

    joinMsg.innerHTML = "Code sent to email ✔";

  }catch(e){
    joinMsg.innerHTML = "Error sending code";
  }

  joinBtn.disabled = false;
};

</script>

</body>
</html>
