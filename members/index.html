<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTN Members</title>

  <!-- LTN FORCE UPDATE VERSION: members-achievements-display-20260512-v5 -->

  <style>
    *{
      box-sizing:border-box;
      -webkit-text-size-adjust:100%;
    }

    html,body{
      overflow-x:hidden;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f0f4f8;
      color:#293241;
    }

    .topbar{
      background:#3d5a80;
      color:white;
      padding:16px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      box-shadow:0 6px 20px rgba(0,0,0,.14);
    }

    .logo{
      font-weight:800;
      font-size:22px;
      word-break:break-word;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .nav a,
    .nav button{
      color:white;
      text-decoration:none;
      font-weight:700;
      background:none;
      border:none;
      cursor:pointer;
      font-size:14px;
      padding:0;
      font-family:inherit;
    }

    .nav a:hover,
    .nav button:hover{
      opacity:.8;
    }

    .hero{
      background:linear-gradient(135deg,#ff8c3a,#ea6a00);
      color:white;
      padding:52px 20px;
      text-align:center;
    }

    .hero h1{
      margin:0;
      font-size:40px;
      line-height:1.1;
    }

    .hero p{
      font-size:18px;
      margin:12px auto 0;
      max-width:850px;
      line-height:1.5;
    }

    .wrap{
      max-width:1180px;
      margin:0 auto;
      padding:30px 20px;
    }

    .search-box{
      background:white;
      padding:20px;
      border-radius:18px;
      box-shadow:0 8px 25px rgba(0,0,0,.08);
      margin-bottom:25px;
      border:1px solid #e2e8f0;
    }

    input{
      width:100%;
      padding:14px;
      border:1px solid #cfd9e6;
      border-radius:12px;
      font-size:16px;
      outline:none;
    }

    input:focus{
      border-color:#ea6a00;
      box-shadow:0 0 0 3px rgba(234,106,0,.15);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      border-radius:20px;
      padding:22px;
      box-shadow:0 8px 25px rgba(0,0,0,.08);
      border:1px solid #e2e8f0;
      overflow:hidden;
    }

    .avatar{
      width:78px;
      height:78px;
      border-radius:50%;
      background:#3d5a80;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      font-weight:800;
      margin-bottom:14px;
      overflow:hidden;
      flex-shrink:0;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .name{
      font-size:22px;
      font-weight:800;
      margin-bottom:5px;
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
      word-break:break-word;
    }

    .ltn-check{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:22px;
      height:22px;
      border-radius:50%;
      background:#ea6a00;
      color:white;
      font-size:14px;
      font-weight:900;
      line-height:1;
      vertical-align:middle;
      box-shadow:0 2px 5px rgba(0,0,0,.18);
      flex-shrink:0;
    }

    .trade{
      color:#ea6a00;
      font-weight:800;
      margin-bottom:6px;
      word-break:break-word;
    }

    .location{
      color:#64748b;
      font-size:14px;
      margin-bottom:8px;
      line-height:1.4;
      word-break:break-word;
    }

    .bio{
      color:#475569;
      font-size:14px;
      margin:12px 0 14px;
      line-height:1.45;
      word-break:break-word;
    }

    .achievement-box{
      background:#f8fafc;
      border:1px solid #e2e8f0;
      border-radius:16px;
      padding:14px;
      margin-top:14px;
    }

    .achievement-title{
      font-size:13px;
      font-weight:900;
      color:#334155;
      text-transform:uppercase;
      letter-spacing:.4px;
      margin-bottom:10px;
    }

    .achievement-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .achievement-stat{
      background:white;
      border:1px solid #e2e8f0;
      border-radius:12px;
      padding:10px;
      min-width:0;
    }

    .achievement-stat strong{
      display:block;
      color:#1e293b;
      font-size:18px;
      line-height:1.1;
      word-break:break-word;
    }

    .achievement-stat span{
      display:block;
      color:#64748b;
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      margin-top:3px;
      line-height:1.25;
      word-break:break-word;
    }

    .progress-mini{
      margin-top:12px;
    }

    .progress-mini-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      color:#475569;
      font-size:13px;
      font-weight:800;
      margin-bottom:6px;
    }

    .progress-track{
      height:10px;
      background:#e2e8f0;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#ea6a00,#ff9a3c);
      border-radius:999px;
    }

    .badge-list{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-top:12px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:5px;
      background:#fff4e8;
      color:#c35700;
      border:1px solid #ffd3aa;
      border-radius:999px;
      padding:6px 9px;
      font-size:12px;
      font-weight:800;
      max-width:100%;
      word-break:break-word;
    }

    .btn{
      display:inline-block;
      background:#ea6a00;
      color:white;
      padding:10px 16px;
      border-radius:10px;
      text-decoration:none;
      font-weight:800;
      cursor:pointer;
      border:none;
      margin-top:14px;
      font-family:inherit;
    }

    .btn:hover{
      background:#c35700;
    }

    .empty{
      background:white;
      padding:25px;
      border-radius:18px;
      text-align:center;
      color:#64748b;
      box-shadow:0 8px 25px rgba(0,0,0,.08);
      border:1px solid #e2e8f0;
      line-height:1.5;
    }

    @media(max-width:760px){
      .topbar{
        flex-direction:column;
        align-items:flex-start;
        padding:14px 16px;
      }

      .nav{
        width:100%;
      }

      .logo{
        font-size:18px;
      }

      .hero{
        padding:38px 16px;
      }

      .hero h1{
        font-size:32px;
      }

      .hero p{
        font-size:16px;
      }

      .wrap{
        padding:22px 14px;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .achievement-grid{
        grid-template-columns:1fr 1fr;
      }
    }

    @media(max-width:420px){
      .achievement-grid{
        grid-template-columns:1fr;
      }

      .card{
        padding:18px;
      }
    }
  </style>
</head>

<body>

<script>
(function () {
  const accessGranted = localStorage.getItem("ltn_access_granted") === "true";

  if (!accessGranted) {
    window.location.replace("front.html?v=membersblocked-achievements-v5");
    return;
  }
})();
</script>

<div class="topbar">
  <div class="logo">LTN • LinkTradeNetwork</div>

  <div class="nav">
    <a href="dashboard.html?v=20260512membersachievements5">Dashboard</a>
    <a href="members.html?v=20260512membersachievements5">Members</a>
    <button onclick="logoutUser()">Logout</button>
  </div>
</div>

<section class="hero">
  <h1>Trade Members</h1>
  <p>See skilled trade workers, apprentices, instructors, contractors, and employers joining LinkTradeNetwork — including hours, certifications, skills, and jobsite proof.</p>
</section>

<div class="wrap">

  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Search by name, trade, city, state, country, role, certification, skill, or apprenticeship level...">
  </div>

  <div id="membersGrid" class="grid">
    <div class="empty">Loading members...</div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAVlM1EtPtMMO6A_u1XUnWO2ie3E2liY6c",
    authDomain: "linktradenetwork-2dcd1.firebaseapp.com",
    projectId: "linktradenetwork-2dcd1",
    storageBucket: "linktradenetwork-2dcd1.firebasestorage.app",
    messagingSenderId: "219091766597",
    appId: "1:219091766597:web:9878c199ba17e0ed89c22c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let members = [];

  window.logoutUser = async function () {
    try{
      await signOut(auth);
    }catch(e){}

    localStorage.removeItem("ltn_access_granted");
    localStorage.removeItem("ltn_current_profile");
    localStorage.removeItem("ltnUserProfile");
    localStorage.removeItem("ltn_profile");
    localStorage.removeItem("currentUserProfile");
    localStorage.removeItem("userProfile");
    localStorage.removeItem("userEmail");
    localStorage.removeItem("profileEmail");
    localStorage.removeItem("ltn_user");
    localStorage.removeItem("userName");
    localStorage.removeItem("ltn_apprentice_email");

    window.location.replace("front.html?v=loggedoutmembers-achievements-v5");
  };

  function safe(value){
    return String(value || "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function safeUrl(value){
    return encodeURIComponent(String(value || ""));
  }

  function getInitials(name){
    if(!name) return "LT";
    return name
      .split(" ")
      .filter(Boolean)
      .map(w => w[0])
      .join("")
      .substring(0,2)
      .toUpperCase();
  }

  function getProfilePhoto(member){
    return (
      member.profileImageUrl ||
      member.profileImage ||
      member.photoURL ||
      member.photoUrl ||
      member.profilePhoto ||
      member.profilePhotoUrl ||
      member.avatarUrl ||
      member.avatar ||
      member.imageUrl ||
      member.image ||
      member.picture ||
      ""
    );
  }

  function isLTNVerified(member){
    return (
      member.ltnVerified === true ||
      member.ltnVerified === "true" ||
      member.ltnverified === true ||
      member.ltnverified === "true" ||
      member.verified === true ||
      member.verified === "true" ||
      member.orangeVerified === true ||
      member.orangeVerified === "true"
    );
  }

  function verifiedBadge(member){
    return isLTNVerified(member)
      ? `<span class="ltn-check" title="LTN Verified">✓</span>`
      : "";
  }

  function getProgress(member){
    const p = member.apprenticeshipProgress || {};

    const hours = Number(
      member.hoursCompleted ??
      member.totalHours ??
      member.apprenticeshipHours ??
      p.hoursCompleted ??
      p.totalHours ??
      0
    ) || 0;

    const progressPercent = Number(
      member.progressPercent ??
      p.progressPercent ??
      Math.min(100, Math.round((hours / 8000) * 100))
    ) || 0;

    const certifications = Array.isArray(member.certifications)
      ? member.certifications
      : Array.isArray(p.certifications)
        ? p.certifications
        : [];

    const skills = Array.isArray(member.skillsLearned)
      ? member.skillsLearned
      : Array.isArray(member.skills)
        ? member.skills
        : Array.isArray(p.skillsLearned)
          ? p.skillsLearned
          : [];

    const badges = Array.isArray(member.badgesEarned)
      ? member.badgesEarned
      : Array.isArray(member.badges)
        ? member.badges
        : Array.isArray(p.badgesEarned)
          ? p.badgesEarned
          : [];

    const projectsCompleted = Number(
      member.projectsCompleted ??
      p.projectsCompleted ??
      0
    ) || 0;

    const jobsiteUploads = Number(
      member.jobsiteUploads ??
      member.verifiedPhotos ??
      p.jobsiteUploads ??
      p.verifiedPhotos ??
      0
    ) || 0;

    const apprenticeLevel =
      member.apprenticeLevel ||
      member.currentLevel ||
      p.apprenticeLevel ||
      p.currentLevel ||
      "";

    return {
      hours,
      progressPercent: Math.max(0, Math.min(100, progressPercent)),
      certifications,
      skills,
      badges,
      projectsCompleted,
      jobsiteUploads,
      apprenticeLevel
    };
  }

  function hasAchievements(progress){
    return (
      progress.hours > 0 ||
      progress.certifications.length > 0 ||
      progress.skills.length > 0 ||
      progress.badges.length > 0 ||
      progress.projectsCompleted > 0 ||
      progress.jobsiteUploads > 0 ||
      progress.apprenticeLevel
    );
  }

  function renderAchievements(member){
    const progress = getProgress(member);

    if(!hasAchievements(progress)){
      return "";
    }

    const visibleBadges = [];

    if(progress.apprenticeLevel){
      visibleBadges.push(progress.apprenticeLevel);
    }

    progress.badges.slice(0,4).forEach(b => visibleBadges.push(b));
    progress.certifications.slice(0,3).forEach(c => visibleBadges.push(c));
    progress.skills.slice(0,3).forEach(s => visibleBadges.push(s));

    const uniqueBadges = [...new Set(visibleBadges.filter(Boolean))].slice(0,7);

    return `
      <div class="achievement-box">
        <div class="achievement-title">Accomplishment Snapshot</div>

        <div class="achievement-grid">
          <div class="achievement-stat">
            <strong>${safe(progress.hours.toLocaleString())}</strong>
            <span>Hours Completed</span>
          </div>

          <div class="achievement-stat">
            <strong>${safe(progress.certifications.length)}</strong>
            <span>Certifications</span>
          </div>

          <div class="achievement-stat">
            <strong>${safe(progress.skills.length)}</strong>
            <span>Skills Learned</span>
          </div>

          <div class="achievement-stat">
            <strong>${safe(progress.jobsiteUploads)}</strong>
            <span>Jobsite Proof</span>
          </div>
        </div>

        <div class="progress-mini">
          <div class="progress-mini-top">
            <span>Apprenticeship Progress</span>
            <span>${safe(progress.progressPercent)}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${safe(progress.progressPercent)}%"></div>
          </div>
        </div>

        ${
          uniqueBadges.length
            ? `<div class="badge-list">
                ${uniqueBadges.map(item => `<span class="badge">✓ ${safe(item)}</span>`).join("")}
              </div>`
            : ""
        }
      </div>
    `;
  }

  function renderMembers(list){
    const grid = document.getElementById("membersGrid");
    grid.innerHTML = "";

    if(list.length === 0){
      grid.innerHTML = `<div class="empty">No members found yet.</div>`;
      return;
    }

    list.forEach(member => {
      const name = member.fullName || member.name || member.displayName || "Trade Member";
      const trade = member.trade || member.specialty || "Trade Not Selected";
      const city = member.city || "";
      const state = member.state || "";
      const country = member.country || "";
      const role = member.role || member.profileType || "";
      const bio = member.bio || "";
      const photo = getProfilePhoto(member);

      const location =
        city || state || country
          ? `${city}${city && state ? ", " : ""}${state}${(city || state) && country ? ", " : ""}${country}`
          : "";

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="avatar">
          ${
            photo
              ? `<img src="${safe(photo)}" alt="${safe(name)}" onerror="this.remove(); this.parentElement.innerText='${safe(getInitials(name))}';">`
              : safe(getInitials(name))
          }
        </div>

        <div class="name">
          <span>${safe(name)}</span>
          ${verifiedBadge(member)}
        </div>

        <div class="trade">${safe(trade)}</div>

        ${role ? `<div class="location"><strong>Role:</strong> ${safe(role)}</div>` : ""}
        ${location ? `<div class="location">${safe(location)}</div>` : ""}
        ${bio ? `<div class="bio">${safe(bio)}</div>` : ""}

        ${renderAchievements(member)}

        <button class="btn" onclick="window.location.href='profile.html?id=${safeUrl(member.id)}&v=20260512membersachievements5'">
          View Profile
        </button>
      `;

      grid.appendChild(card);
    });
  }

  async function loadMembers(){
    try{
      const usersSnap = await getDocs(collection(db, "users"));
      members = [];

      usersSnap.forEach(docSnap => {
        members.push({ id: docSnap.id, ...docSnap.data() });
      });

      renderMembers(members);

    }catch(error){
      console.error(error);
      document.getElementById("membersGrid").innerHTML =
        `<div class="empty">Could not load members. Please refresh the page.</div>`;
    }
  }

  document.getElementById("searchInput").addEventListener("input", function(){
    const term = this.value.toLowerCase().trim();

    const filtered = members.filter(member => {
      const progress = getProgress(member);

      const text = `
        ${member.name || ""}
        ${member.fullName || ""}
        ${member.displayName || ""}
        ${member.trade || ""}
        ${member.specialty || ""}
        ${member.city || ""}
        ${member.state || ""}
        ${member.country || ""}
        ${member.role || ""}
        ${member.profileType || ""}
        ${member.bio || ""}
        ${progress.apprenticeLevel || ""}
        ${progress.hours || ""}
        ${progress.progressPercent || ""}
        ${progress.certifications.join(" ")}
        ${progress.skills.join(" ")}
        ${progress.badges.join(" ")}
      `.toLowerCase();

      return text.includes(term);
    });

    renderMembers(filtered);
  });

  loadMembers();
</script>

</body>
</html>
